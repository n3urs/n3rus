<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Catcher 🎮</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1 class="site-title">Heart Catcher 🎮</h1>
    <nav class="nav">
      <a href="index.html"><span class="hg">⏳</span> countdown</a>
      <a href="garden.html">🌷 garden</a>
      <a href="mailbox.html">💌 mailbox</a>
      <a href="treasure.html" class="lock" title="locked… for now">🔒</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <p class="muted">catch the falling hearts in your basket — drag with your finger or mouse.<br>
      drop three and it's game over 💔 &nbsp;medals at 15, 30 and 50!</p>
      <div class="game-wrap">
        <canvas id="game" width="360" height="480"></canvas>
        <div class="game-overlay" id="game-overlay">
          <h2 id="game-title">ready?</h2>
          <p class="muted" id="game-sub">hearts are falling for you. literally.</p>
          <div class="diff-picker">
            <button class="diff-btn active" data-diff="easy">easy</button>
            <button class="diff-btn" data-diff="medium">medium</button>
            <button class="diff-btn" data-diff="hard">hard</button>
          </div>
          <button class="btn" id="game-start">start 💗</button>
        </div>
      </div>
      <p class="muted tiny" id="game-best"></p>
    </section>
  </main>

  <footer>my heart is among them. catch carefully.</footer>

  <script src="js/config.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/medals.js"></script>
  <script src="js/eggs.js"></script>
  <script src="js/arcade.js"></script>
</body>
</html>
